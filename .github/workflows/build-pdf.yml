name: Build PDF

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          extra_system_packages: fontconfig wget
          pre_compile: |
            mkdir -p /usr/local/share/fonts/vazirmatn
            wget -q -P /usr/local/share/fonts/vazirmatn https://raw.githubusercontent.com/rastikerdar/vazirmatn/v33.003/fonts/ttf/Vazirmatn-Regular.ttf
            wget -q -P /usr/local/share/fonts/vazirmatn https://raw.githubusercontent.com/rastikerdar/vazirmatn/v33.003/fonts/ttf/Vazirmatn-Bold.ttf
            wget -q -P /usr/local/share/fonts/vazirmatn https://raw.githubusercontent.com/rastikerdar/vazirmatn/v33.003/fonts/ttf/Vazirmatn-Light.ttf
            fc-cache -f

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: applyway-pdf
          path: main.pdf
          if-no-files-found: error
