name: Build PDF

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          texlive_version: 2023
          latexmk_use_xelatex: true
          extra_system_packages: fontconfig wget
          pre_compile: |
            mkdir -p /usr/local/share/fonts/vazirmatn
            wget -q -P /usr/local/share/fonts/vazirmatn https://raw.githubusercontent.com/rastikerdar/vazirmatn/v33.003/fonts/ttf/Vazirmatn-Regular.ttf
            wget -q -P /usr/local/share/fonts/vazirmatn https://raw.githubusercontent.com/rastikerdar/vazirmatn/v33.003/fonts/ttf/Vazirmatn-Bold.ttf
            wget -q -P /usr/local/share/fonts/vazirmatn https://raw.githubusercontent.com/rastikerdar/vazirmatn/v33.003/fonts/ttf/Vazirmatn-Light.ttf
            fc-cache -f

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: applyway-pdf
          path: main.pdf
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download PDF
        uses: actions/download-artifact@v7
        with:
          name: applyway-pdf
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/main.pdf
